---

name: Deploy

'on':
  push:
    branches:
      - master
    paths:
      - ansible/**
  workflow_dispatch:
  schedule:
    - cron: 0 6 * * *  # every day at 6am


jobs:
  # This is a bit of a hack - ideally deployments would happen using something like AWX, but this mostly works (kind of)
  deploy-prod:
    environment: production
    runs-on: ubuntu-latest
    concurrency:
      group: ansible-deployment-production
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run playbook
        uses: dawidd6/action-ansible-playbook@6c0a4f86519cc4a09ba95e5077ecfa2141deba9e # v7
        with:
          playbook: main.yml
          directory: ./ansible
          key: ${{secrets.RUNNER_SSH_PRIVATE_KEY}}
          inventory: |
            [dockerhosts]
            139.59.190.200 ansible_user=root
          vault_password: ${{secrets.VAULT_PASSWORD}}
          requirements: requirements.yml
          options: |
            --verbose
